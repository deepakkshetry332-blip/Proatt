<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProAttend - Admin Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-50 bg-white flex flex-col justify-center items-center p-8">
        <h1 class="text-3xl font-black mb-8 italic text-indigo-600">ProAttend</h1>
        <div class="w-full max-w-sm space-y-3">
            <input type="email" id="auth-email" placeholder="Email" class="w-full px-5 py-4 rounded-2xl border bg-slate-50 outline-none">
            <input type="password" id="auth-password" placeholder="Password" class="w-full px-5 py-4 rounded-2xl border bg-slate-50 outline-none">
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg">Login</button>
        </div>
    </div>

    <div id="app-content" class="hidden flex-1 flex flex-col h-full max-w-md mx-auto w-full bg-white relative">
        <header class="p-4 border-b flex justify-between items-center bg-white">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold">U</div>
                <h2 id="user-name" class="font-bold">Student</h2>
            </div>
            <button onclick="toggleAdminModal()" class="p-2 bg-slate-100 rounded-xl"><i data-lucide="settings"></i></button>
        </header>

        <main class="p-5 space-y-6">
            <select id="class-select" class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none">
                <option value="">-- Choose Class --</option>
            </select>
            <button onclick="startCheckIn()" class="w-full bg-emerald-500 text-white p-6 rounded-3xl shadow-xl font-black uppercase tracking-widest">Check In</button>
        </main>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 z-[60] bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="toggleAdminModal()" class="absolute top-6 right-6 text-slate-400"><i data-lucide="x"></i></button>
            
            <h3 class="font-black text-2xl mb-6">Admin Panel</h3>

            <div id="admin-unlock-view">
                <p class="text-sm text-slate-500 mb-4">Enter PIN to access settings</p>
                <input type="password" id="admin-pin-input" class="w-full text-center text-3xl font-black p-4 bg-slate-50 border rounded-2xl mb-4" placeholder="****">
                <button onclick="verifyAdmin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl">Unlock Panel</button>
            </div>

            <div id="admin-controls-view" class="hidden space-y-4">
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <p class="text-xs font-bold text-blue-600 mb-2 uppercase">Location Control</p>
                    <button onclick="setOfficeLoc()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">📍 Set My GPS as Center</button>
                </div>
                <div class="bg-purple-50 p-4 rounded-2xl border border-purple-100">
                    <p class="text-xs font-bold text-purple-600 mb-2 uppercase">Class Code</p>
                    <input type="text" id="new-daily-code" class="w-full p-3 rounded-xl border mb-2 text-center font-bold" placeholder="New Code (e.g. 1234)">
                    <button onclick="saveNewCode()" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold text-sm">Save Code</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (YOUR API KEY)
        const firebaseConfig = {
            apiKey: "AIzaSyCLEcbCVwXbx_ei43FnZ67yKJOHO_IYpC4",
            authDomain: "proattend-87ff1.firebaseapp.com",
            projectId: "proattend-87ff1",
            storageBucket: "proattend-87ff1.firebasestorage.app",
            messagingSenderId: "886513362569",
            appId: "1:886513362569:web:11822d359d1863c33d8858"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentAdminPin = "8747"; // Default fallback

        // AUTH
        function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-name').innerText = u.displayName || 'Student';
                initData();
            }
        });

        function initData() {
            // Get current pin and settings from DB
            db.collection('settings').doc('config').onSnapshot(doc => {
                if(doc.exists) {
                    currentAdminPin = doc.data().adminPin || "8747";
                }
            });
            // Fill classes
            db.collection('settings').doc('classes').onSnapshot(doc => {
                const list = doc.exists ? doc.data().list : ['General'];
                const select = document.getElementById('class-select');
                select.innerHTML = '';
                list.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
            });
            lucide.createIcons();
        }

        // ADMIN PANEL LOGIC
        function toggleAdminModal() {
            document.getElementById('admin-modal').classList.toggle('hidden');
        }

        function verifyAdmin() {
            const input = document.getElementById('admin-pin-input').value;
            
            // Log for debugging (you can see this in F12 console)
            console.log("Input PIN:", input);
            console.log("Expected PIN:", currentAdminPin);

            if (input === currentAdminPin) {
                document.getElementById('admin-unlock-view').classList.add('hidden');
                document.getElementById('admin-controls-view').classList.remove('hidden');
                alert("Success: Admin Unlocked");
            } else {
                alert("Error: Incorrect PIN. Try 8747");
            }
        }

        async function setOfficeLoc() {
            navigator.geolocation.getCurrentPosition(async pos => {
                await db.collection('settings').doc('config').set({
                    location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                }, { merge: true });
                alert("Success: Office location updated to your current spot.");
            }, e => alert("GPS Error: " + e.message), {enableHighAccuracy: true});
        }

        async function saveNewCode() {
            const code = document.getElementById('new-daily-code').value;
            if(!code) return alert("Enter a code first");
            await db.collection('settings').doc('config').set({ dailyCode: code }, { merge: true });
            alert("Success: Class code is now " + code);
        }
    </script>
</body>
</html>
