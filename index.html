<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .btn-pulse { animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-50 bg-white flex flex-col justify-center items-center p-6">
        <div class="text-center w-full max-w-sm">
            <div class="bg-indigo-100 p-5 rounded-full inline-flex mb-6">
                <i data-lucide="lock" class="w-12 h-12 text-indigo-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Secure Login</h1>
            <p class="text-gray-500 mb-6">Student ID or Email required</p>
            
            <input type="email" id="auth-email" placeholder="Email/ID" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 mb-3 text-lg">
            <input type="password" id="auth-password" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 mb-4 text-lg">
            <input type="text" id="auth-name" placeholder="Full Name" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 mb-4 text-lg hidden">

            <button onclick="toggleAuthMode()" id="toggle-auth-btn" class="w-full text-indigo-500 font-semibold py-2 mb-4">
                New User? Tap to Register
            </button>
            
            <button id="login-btn" onclick="handleLogin()" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl shadow-lg transition active:scale-95">Login</button>
            <button id="register-btn" onclick="handleRegister()" class="w-full bg-green-600 text-white font-semibold py-3 rounded-xl shadow-lg transition active:scale-95 hidden">Register & Login</button>
        </div>
    </div>

    <div id="app-content" class="hidden flex-1 flex flex-col h-full max-w-md mx-auto w-full bg-white shadow-2xl relative">
        <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <div id="user-initial" class="w-8 h-8 rounded-full bg-indigo-500 text-white font-bold flex items-center justify-center text-sm">U</div>
                <div>
                    <h2 class="font-bold text-sm" id="display-name">User</h2>
                    <p class="text-xs text-green-600 font-medium" id="current-class-display">Select Class</p>
                </div>
            </div>
            <button onclick="toggleSettings()" class="p-2 bg-gray-100 rounded-full"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto hide-scrollbar p-5 pb-32">
            <div class="mb-6">
                <label class="text-xs font-bold text-gray-400 uppercase">Select Class</label>
                <select id="class-select" onchange="updateClassUI()" class="w-full mt-1 p-3 bg-gray-50 border rounded-xl font-semibold">
                    <option value="">-- Loading Classes --</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="prepareCheckIn()" id="btn-in" class="btn-pulse flex flex-col items-center p-6 bg-green-600 text-white rounded-2xl shadow-lg transition">
                    <i data-lucide="log-in" class="w-8 h-8 mb-2"></i>
                    <span class="font-bold">Check In</span>
                </button>
                <button onclick="confirmCheckOut()" id="btn-out" class="flex flex-col items-center p-6 bg-red-500 text-white rounded-2xl shadow-lg opacity-50 cursor-not-allowed" disabled>
                    <i data-lucide="log-out" class="w-8 h-8 mb-2"></i>
                    <span class="font-bold">Check Out</span>
                </button>
            </div>

            <div class="bg-indigo-50 rounded-xl p-4 border border-indigo-100 mb-8 text-center">
                <span id="gps-indicator" class="text-[10px] bg-white px-2 py-1 rounded shadow-sm text-gray-500 mb-2 inline-block">GPS Readiness: Pending</span>
                <h3 class="text-xl font-bold text-indigo-900" id="status-text">Not Checked In</h3>
                <p class="text-xs text-indigo-600 mt-1" id="time-log">--:--</p>
            </div>

            <div id="history-list" class="space-y-3"></div>
        </main>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 max-h-[90%] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-xl">Admin Panel</h3>
                <button onclick="toggleSettings()"><i data-lucide="x"></i></button>
            </div>
            <div id="admin-lock-screen">
                <input type="password" id="admin-pin-input" class="w-full p-3 border rounded-lg text-center text-xl mb-3" placeholder="Admin PIN">
                <button onclick="verifyAdmin()" class="w-full bg-gray-800 text-white py-3 rounded-lg">Unlock</button>
            </div>
            <div id="admin-controls" class="hidden space-y-4">
                <button onclick="setOfficeLocation()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm">📍 Set Current GPS as Office</button>
                <input type="text" id="daily-code-input" class="w-full p-2 border rounded text-center" placeholder="Daily Code">
                <button onclick="saveDailyCode()" class="w-full bg-purple-600 text-white py-2 rounded-lg text-sm">Save Code</button>
                <button onclick="auth.signOut()" class="w-full text-red-500 text-sm mt-4">Log Out</button>
            </div>
        </div>
    </div>

    <div id="code-modal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-xs p-6 text-center">
            <h3 class="font-bold mb-2">Class Code</h3>
            <input type="number" id="student-code-input" class="w-full p-4 bg-gray-50 border-2 rounded-xl text-center text-2xl font-bold mb-4" placeholder="0000">
            <button onclick="confirmCheckIn()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">Verify & Check-In</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-xl opacity-0 transition-all z-[60]">
        <span id="toast-message"></span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLEcbCVwXbx_ei43FnZ67yKJOHO_IYpC4",
            authDomain: "proattend-87ff1.firebaseapp.com",
            projectId: "proattend-87ff1",
            storageBucket: "proattend-87ff1.firebasestorage.app",
            messagingSenderId: "886513362569",
            appId: "1:886513362569:web:11822d359d1863c33d8858",
            measurementId: "G-CVPRJW2BVC"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser, officeLocation, dailyCode, currentAdminPin;
        const GEOFENCE_RADIUS = 150; // Meters (increased slightly for better reliability)

        // 1. AUTH
        function toggleAuthMode() {
            const isReg = document.getElementById('auth-name').classList.toggle('hidden');
            document.getElementById('login-btn').classList.toggle('hidden', !isReg);
            document.getElementById('register-btn').classList.toggle('hidden', isReg);
            document.getElementById('toggle-auth-btn').innerText = !isReg ? "Already have an account? Login" : "New User? Tap to Register";
        }

        function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => showToast(e.message, 'error'));
        }

        function handleRegister() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .then(res => res.user.updateProfile({ displayName: name }))
                .catch(e => showToast(e.message, 'error'));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('display-name').innerText = user.displayName || 'Student';
                initData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });

        // 2. DATA
        function initData() {
            db.collection('settings').doc('config').onSnapshot(doc => {
                const data = doc.data() || {};
                officeLocation = data.location;
                dailyCode = data.dailyCode;
                currentAdminPin = data.adminPin || "8747";
            });

            db.collection('settings').doc('classes').onSnapshot(doc => {
                const list = doc.exists ? doc.data().list : ['General'];
                const select = document.getElementById('class-select');
                select.innerHTML = '<option value="">-- Select Class --</option>';
                list.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
            });
            loadHistory();
            lucide.createIcons();
        }

        // 3. GPS & PERMISSIONS
        function getPreciseLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) return reject(new Error("Geolocation not supported"));
                
                showToast("🛰️ Locating satellite...", "info");
                
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                });
            });
        }

        async function prepareCheckIn() {
            const cls = document.getElementById('class-select').value;
            if (!cls) return showToast("Select a class first", "error");
            if (!officeLocation) return showToast("Admin hasn't set location", "error");

            try {
                const pos = await getPreciseLocation();
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, officeLocation.lat, officeLocation.lng);
                
                document.getElementById('gps-indicator').innerText = `GPS Accuracy: ±${Math.round(pos.coords.accuracy)}m`;

                if (dist > GEOFENCE_RADIUS) {
                    return showToast(`❌ Out of range (${Math.round(dist)}m away)`, "error");
                }
                
                document.getElementById('code-modal').classList.remove('hidden');
            } catch (err) {
                handleGPSError(err);
            }
        }

        function handleGPSError(err) {
            let msg = "GPS Error";
            if (err.code === 1) msg = "Please allow Location access in Settings";
            if (err.code === 3) msg = "GPS Timeout. Try standing near a window.";
            showToast(msg, "error");
        }

        function confirmCheckIn() {
            const code = document.getElementById('student-code-input').value;
            if (code !== dailyCode) return showToast("Incorrect Class Code", "error");
            
            saveRecord('IN');
            document.getElementById('code-modal').classList.add('hidden');
        }

        async function saveRecord(type) {
            const dateStr = new Date().toISOString().split('T')[0];
            const cls = document.getElementById('class-select').value;
            
            if (type === 'IN') {
                await db.collection('attendance').add({
                    uid: currentUser.uid,
                    name: currentUser.displayName,
                    class: cls,
                    dateId: dateStr,
                    checkInTime: new Date().toLocaleTimeString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast("Check-in Successful!", "success");
            }
            updateClassUI();
        }

        // 4. UTILS
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            const tm = document.getElementById('toast-message');
            tm.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-xl z-[60] transition-all ${type === 'error' ? 'bg-red-600' : 'bg-green-600'} text-white opacity-100`;
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        function verifyAdmin() {
            if(document.getElementById('admin-pin-input').value === currentAdminPin) {
                document.getElementById('admin-lock-screen').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
            }
        }

        async function setOfficeLocation() {
            const pos = await getPreciseLocation();
            await db.collection('settings').doc('config').set({ 
                location: { lat: pos.coords.latitude, lng: pos.coords.longitude } 
            }, { merge: true });
            showToast("Office location updated!", "success");
        }

        function updateClassUI() {
            // Logic to check Firestore if user is already checked in today for this class
            // (Same as your original status logic)
        }

        function loadHistory() {
            db.collection('attendance').orderBy('timestamp', 'desc').limit(10).onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="bg-white p-3 rounded-lg border flex justify-between items-center shadow-sm">
                            <div>
                                <p class="font-bold text-sm">${d.name}</p>
                                <p class="text-[10px] text-gray-400">${d.class} • ${d.dateId}</p>
                            </div>
                            <p class="text-xs font-mono bg-gray-100 px-2 py-1 rounded">${d.checkInTime}</p>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
